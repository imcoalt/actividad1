<script>
(function() {
  const checkH5P = setInterval(function() {
    if (window.H5P && H5P.externalDispatcher) {
      clearInterval(checkH5P);
      H5P.externalDispatcher.on('xAPI', function (event) {
        if (event.getVerb() === 'completed') {
          var statement = event.data.statement;
          if (statement.object.definition.interactionType === "fill-in") {
            var rawResponse = statement.result.response || "";
            var listaRespuestas = rawResponse.split('[,]');
            var payload = {
              usuario: "Estudiante_UNC", 
              actividad: "Actividad 1 - Narrativas",
              puntaje: (statement.result.score.scaled * 100).toFixed(0),
              respuestas: listaRespuestas
            };

            // https://script.google.com/macros/s/AKfycbwiHaW3sVnB1gavCsiQ7NIhRylb-51tHOeE1rLCzCTkRk_FisN_qAs-_m_NabCFLhUw/exec
            fetch('https://script.google.com/macros/s/TU_ID_AQUÍ/exec', {
              method: 'POST',
              body: JSON.stringify(payload),
              mode: 'no-cors'
            });
          }
        }
      });
    }
  }, 500);
})();
</script>
